        var cnvs = document.getElementById("canvas");
        var cont  = cnvs.getContext("2d");
        cnvs.width = window.innerWidth;
        cnvs.height = window.innerHeight;
        var imdt  = cont.getImageData(0, 0, canvas.width, canvas.height);
        for(let x = 0; x < imdt.height;x++){
			for(let y = 0; y < imdt.width; y++){
				imdt.data[(x*4*imdt.width+y*4+3)] = 255;
			}
		}
        
    function Update(){
		for(let x = 0; x < imdt.height;x++){
			for(let y = 0; y < imdt.width; y++){
				imdt.data[(x*4*imdt.width+y*4+0)] = ( offset + y*x*4) % 256;
				imdt.data[(x*4*imdt.width+y*4+1)] = ( offset + y*x*2) % 256;
				imdt.data[(x*4*imdt.width+y*4+2)] = ( offset + y *x) % 256;
				
			}
		}
        cont.putImageData(imdt, 0, 0);
        offset+=1;
        window.requestAnimationFrame(Update);
        }
        requestAnimationFrame(Update)
